<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>CalcBinder Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject, listAll, getMetadata } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js';
    </script>
    <style>
        body { font-family: 'Noto Sans', sans-serif; }
        .preview-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .preview-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .preview-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .preview-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .drag-ghost { opacity: 0.5; background: white; border: 1px solid #ccc; }

        /* Brand color utilities (defined explicitly since Tailwind CDN JIT
           doesn't reliably generate custom color classes at runtime) */
        :root {
            --brand-blue:    #377F99;
            --brand-blue-dk: #265f75;
            --brand-blue-md: #2d7289;
            --brand-blue-lt: #5aa3bc;
            --brand-blue-pl: #e6f3f8;
            --brand-gray:    #54585A;
            --brand-red:     #C8102E;
        }
        .bg-brand-blue       { background-color: var(--brand-blue)    !important; }
        .bg-brand-blue-dk    { background-color: var(--brand-blue-dk)  !important; }
        .bg-brand-blue-md    { background-color: var(--brand-blue-md)  !important; }
        .bg-brand-blue-lt    { background-color: var(--brand-blue-lt)  !important; }
        .bg-brand-blue-pl    { background-color: var(--brand-blue-pl)  !important; }
        .text-brand-blue     { color: var(--brand-blue)    !important; }
        .text-brand-blue-dk  { color: var(--brand-blue-dk)  !important; }
        .text-brand-blue-lt  { color: var(--brand-blue-lt)  !important; }
        .border-brand-blue   { border-color: var(--brand-blue) !important; }
        .ring-brand-blue     { --tw-ring-color: var(--brand-blue) !important; }

        .hover\:bg-brand-blue:hover    { background-color: var(--brand-blue)    !important; }
        .hover\:bg-brand-blue-dk:hover { background-color: var(--brand-blue-dk)  !important; }
        .hover\:bg-brand-blue-pl:hover { background-color: var(--brand-blue-pl)  !important; }
        .hover\:text-brand-blue:hover  { color: var(--brand-blue) !important; }

        .focus\:border-brand-blue:focus { border-color: var(--brand-blue) !important; }
        .focus\:ring-brand-blue:focus   { --tw-ring-color: var(--brand-blue) !important; }

        .border-brand-blue  { border-color: var(--brand-blue) !important; }
        .ring-2.ring-brand-blue { --tw-ring-color: var(--brand-blue) !important; }
        .border-l-4.border-brand-blue { border-left-color: var(--brand-blue) !important; }
        .border-t-2.border-t-brand-blue { border-top-color: var(--brand-blue) !important; }
    </style>
</head>
<body class="bg-slate-100 overflow-hidden">
    <div id="root" class="h-screen flex flex-col"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useMemo, useEffect, useCallback } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { Upload, FileText, ArrowUp, ArrowDown, ArrowRight, ArrowLeft, Trash2, Save, FilePlus, Settings, Eye, AlertCircle, AlignLeft, AlignCenter, AlignRight, Image as ImageIcon, X, FileQuestion, RefreshCw, Check, Loader2, Lock, Key, RotateCcw, AlertTriangle, FolderPlus, Layout, LogOut, Globe, PenTool, ClipboardList, Type, Copy, GripVertical, ExternalLink, ChevronLeft, ChevronRight, ChevronDown, ChevronUp, Search, Tag, FileDown, Clock, User, Hash } from 'https://esm.sh/lucide-react@0.263.1';
        import { initializeApp, deleteApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject, listAll, getMetadata } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js';

        // --- CONFIG ---
        let firebaseConfig = null, isConfigured = false, appId = 'default';
        if (typeof __firebase_config !== 'undefined') {
            try { firebaseConfig = JSON.parse(__firebase_config); isConfigured = true; if (typeof __app_id !== 'undefined') appId = __app_id; } catch(e) {}
        }
        if (!isConfigured) {
            const saved = localStorage.getItem('calcBinder_firebaseConfig');
            if (saved && saved !== 'offline') {
                try { firebaseConfig = JSON.parse(saved); if (firebaseConfig.apiKey && firebaseConfig.projectId) { isConfigured = true; appId = firebaseConfig.appId || 'default'; } } catch(e) { localStorage.removeItem('calcBinder_firebaseConfig'); }
            }
        }
        let app, auth, db, storage;
        if (isConfigured && firebaseConfig) {
            try { app = initializeApp(firebaseConfig); auth = getAuth(app); db = getFirestore(app); storage = getStorage(app); } catch(e) { isConfigured = false; }
        }

        // --- UTILS ---
        const isEqual = (a, b) => { if (a === b) return true; if (a && b && typeof a === 'object' && typeof b === 'object') { if (Array.isArray(a) !== Array.isArray(b)) return false; const keys = Object.keys(a); if (keys.length !== Object.keys(b).length) return false; return keys.every(k => b.hasOwnProperty(k) && isEqual(a[k], b[k])); } return false; };

        const STATUS_OPTIONS = [
            { value: 'draft',     label: 'Draft',      color: 'bg-slate-100 text-slate-600' },
            { value: 'review',    label: 'In Review',  color: 'bg-amber-100 text-amber-700' },
            { value: 'approved',  label: 'Approved',   color: 'bg-green-100 text-green-700' },
        ];
        const getStatusStyle = (v) => STATUS_OPTIONS.find(s => s.value === v) || STATUS_OPTIONS[0];

        // --- ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            handleReset = () => { localStorage.removeItem('calcBinder_firebaseConfig'); window.location.reload(); }
            render() {
                if (this.state.hasError) return (
                    <div className="min-h-screen flex items-center justify-center bg-red-50 p-8 text-center">
                        <div className="bg-white p-8 rounded-lg shadow-xl max-w-md border border-red-100">
                            <AlertTriangle className="w-12 h-12 text-red-500 mx-auto mb-4" />
                            <h1 className="text-xl font-bold text-red-700 mb-2">Critical Error</h1>
                            <div className="bg-slate-100 p-2 rounded text-xs font-mono text-left mb-6 overflow-auto max-h-32">{this.state.error && this.state.error.toString()}</div>
                            <button onClick={this.handleReset} className="w-full py-2 bg-red-600 text-white rounded font-semibold hover:bg-red-700 flex items-center justify-center gap-2"><RotateCcw className="w-4 h-4" /> Reset</button>
                        </div>
                    </div>
                );
                return this.props.children;
            }
        }

        // --- PDF CANVAS PREVIEW ---
        const PdfCanvasPreview = ({ pdfData }) => {
            const canvasRef = useRef(null), containerRef = useRef(null);
            const [pdfDoc, setPdfDoc] = useState(null), [pageNum, setPageNum] = useState(1), [numPages, setNumPages] = useState(0), [baseWidth, setBaseWidth] = useState(0), [renderError, setRenderError] = useState(null);
            useEffect(() => { if (!pdfData) return; const t = window.pdfjsLib.getDocument({ data: pdfData }); t.promise.then(d => { setPdfDoc(d); setNumPages(d.numPages); setPageNum(1); setRenderError(null); }, () => setRenderError("Failed to load PDF.")); return () => { try { t.destroy(); } catch(e){} }; }, [pdfData]);
            useEffect(() => { if (!containerRef.current) return; const upd = () => { if (containerRef.current?.parentElement) setBaseWidth(containerRef.current.parentElement.clientWidth - 48); }; upd(); const obs = new ResizeObserver(upd); if (containerRef.current.parentElement) obs.observe(containerRef.current.parentElement); return () => obs.disconnect(); }, []);
            useEffect(() => { if (!pdfDoc || !canvasRef.current || !baseWidth) return; let rt = null; const go = async () => { try { const pg = await pdfDoc.getPage(pageNum); const uv = pg.getViewport({ scale: 1 }); const vp = pg.getViewport({ scale: Math.max(0.1, baseWidth / uv.width) }); const cv = canvasRef.current; cv.height = vp.height; cv.width = vp.width; rt = pg.render({ canvasContext: cv.getContext('2d'), viewport: vp }); await rt.promise; } catch(e) { if (e.name !== 'RenderingCancelledException') console.error(e); } }; go(); return () => { try { rt?.cancel(); } catch(e){} }; }, [pdfDoc, pageNum, baseWidth]);
            if (renderError) return <div className="text-red-500 p-4 text-center text-xs">{renderError}</div>;
            return (
                <div className="flex flex-col items-center w-full h-full bg-slate-300 overflow-hidden relative">
                    <div ref={containerRef} className="flex-1 overflow-auto w-full flex justify-center p-6"><canvas ref={canvasRef} className="shadow-lg bg-white" /></div>
                    {numPages > 0 && <div className="absolute bottom-4 z-50 bg-white/90 backdrop-blur shadow-md rounded-full px-4 py-2 flex items-center gap-4 text-sm font-medium text-slate-700 border border-slate-200">
                        <button onClick={() => setPageNum(p => Math.max(1,p-1))} disabled={pageNum<=1} className="hover:text-brand-blue disabled:opacity-30"><ChevronLeft className="w-4 h-4"/></button>
                        <span className="min-w-[80px] text-center">Page {pageNum} / {numPages}</span>
                        <button onClick={() => setPageNum(p => Math.min(numPages,p+1))} disabled={pageNum>=numPages} className="hover:text-brand-blue disabled:opacity-30"><ChevronRight className="w-4 h-4"/></button>
                    </div>}
                </div>
            );
        };

        // --- OUTPUT CONFIG MODAL ---
        const WATERMARK_PRESETS = ['DRAFT','PRELIMINARY','CONFIDENTIAL','FOR REVIEW'];
        const OutputConfigModal = ({ onClose, pageNumberPos, setPageNumberPos, showPageHeader, setShowPageHeader,
            bookmarksEnabled, setBookmarksEnabled, watermarkEnabled, setWatermarkEnabled,
            watermarkText, setWatermarkText, watermarkPages, setWatermarkPages, totalFiles }) => (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                <div className="bg-white rounded-lg shadow-xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
                    <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
                        <h3 className="font-bold text-slate-800 flex items-center gap-2"><Settings className="w-5 h-5 text-brand-blue"/> Output Settings</h3>
                        <button onClick={onClose} className="p-1 hover:bg-slate-100 rounded-full text-slate-400"><X className="w-5 h-5"/></button>
                    </div>
                    <div className="space-y-5">
                        {/* Page numbering */}
                        <div>
                            <label className="text-xs font-bold text-slate-500 uppercase block mb-2">Page Numbering Position</label>
                            <div className="flex bg-slate-100 p-1 rounded-md">
                                {['left','center','right'].map(pos => (
                                    <button key={pos} onClick={() => setPageNumberPos(pos)} className={`flex-1 py-2 rounded text-sm font-medium transition-all capitalize flex items-center justify-center gap-1 ${pageNumberPos===pos?'bg-white shadow text-brand-blue':'text-slate-500 hover:text-slate-700'}`}>
                                        {pos==='left'&&<AlignLeft className="w-3 h-3"/>}{pos==='center'&&<AlignCenter className="w-3 h-3"/>}{pos==='right'&&<AlignRight className="w-3 h-3"/>} {pos.charAt(0).toUpperCase()+pos.slice(1)}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* General toggles */}
                        <div className="space-y-2">
                            <label className="text-xs font-bold text-slate-500 uppercase block">General</label>
                            {[
                                { label:'Table of Contents', sub:'Auto-Generated', checked:true, disabled:true, onChange:()=>{} },
                                { label:'Section Dividers', sub:'Enabled', checked:true, disabled:true, onChange:()=>{} },
                                { label:'Page Headers', sub:'Project No + Title', checked:showPageHeader, disabled:false, onChange:e=>setShowPageHeader(e.target.checked) },
                                { label:'PDF Bookmarks', sub:'Sidebar outline in Acrobat', checked:bookmarksEnabled, disabled:false, onChange:e=>setBookmarksEnabled(e.target.checked) },
                            ].map(item=>(
                                <div key={item.label} className="flex items-center justify-between py-1">
                                    <div className="flex items-center gap-2">
                                        <input type="checkbox" checked={item.checked} disabled={item.disabled} onChange={item.onChange} className="rounded text-brand-blue disabled:opacity-60"/>
                                        <span className={`text-sm font-medium ${item.disabled?'text-slate-400':'text-slate-700'}`}>{item.label}</span>
                                    </div>
                                    <span className="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded">{item.sub}</span>
                                </div>
                            ))}
                        </div>

                        {/* Watermark */}
                        <div className="space-y-3 pt-3 border-t border-slate-100">
                            <div className="flex items-center justify-between">
                                <label className="text-xs font-bold text-slate-500 uppercase">Watermark</label>
                                <button onClick={()=>setWatermarkEnabled(!watermarkEnabled)} className={`relative w-10 h-5 rounded-full transition-colors ${watermarkEnabled?'bg-brand-blue':'bg-slate-300'}`}>
                                    <div className={`absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform ${watermarkEnabled?'translate-x-5':'translate-x-0'}`}/>
                                </button>
                            </div>
                            {watermarkEnabled && (
                                <div className="space-y-3 pl-1">
                                    {/* Presets */}
                                    <div className="flex flex-wrap gap-1.5">
                                        {WATERMARK_PRESETS.map(p=>(
                                            <button key={p} onClick={()=>setWatermarkText(p)} className={`px-2 py-1 text-xs rounded border font-medium transition-all ${watermarkText===p?'bg-brand-blue text-white border-brand-blue':'bg-white text-slate-600 border-slate-300 hover:border-brand-blue'}`}>{p}</button>
                                        ))}
                                    </div>
                                    {/* Custom text */}
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Custom Text</label>
                                        <input type="text" value={watermarkText} onChange={e=>setWatermarkText(e.target.value.toUpperCase())} maxLength={20} className="w-full border border-slate-300 rounded px-2 py-1.5 text-sm font-mono tracking-widest outline-none focus:border-brand-blue" placeholder="DRAFT"/>
                                    </div>
                                    {/* Page scope */}
                                    <div>
                                        <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Apply To</label>
                                        <div className="flex bg-slate-100 p-0.5 rounded-md">
                                            <button onClick={()=>setWatermarkPages('all')} className={`flex-1 py-1.5 rounded text-xs font-medium transition-all ${watermarkPages==='all'?'bg-white shadow text-brand-blue':'text-slate-500'}`}>All Pages</button>
                                            <button onClick={()=>setWatermarkPages('content')} className={`flex-1 py-1.5 rounded text-xs font-medium transition-all ${watermarkPages==='content'?'bg-white shadow text-brand-blue':'text-slate-500'}`}>Content Only</button>
                                        </div>
                                        <p className="text-[10px] text-slate-400 mt-1">{watermarkPages==='content'?'Skips cover, TOC, and divider pages':'Applied to every page including cover and TOC'}</p>
                                    </div>
                                    {/* Preview badge */}
                                    <div className="flex items-center justify-center h-14 bg-slate-50 border border-slate-200 rounded-lg overflow-hidden relative">
                                        <span className="text-slate-200 font-bold text-2xl tracking-widest select-none" style={{transform:'rotate(-15deg)',opacity:0.7}}>{watermarkText||'DRAFT'}</span>
                                        <span className="text-[9px] text-slate-400 absolute bottom-1 right-2">Preview</span>
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="pt-3 border-t border-slate-100 text-center">
                            <span className="text-xs text-slate-400">Total Sections: <span className="font-mono font-bold text-slate-600">{totalFiles}</span></span>
                        </div>
                        <button onClick={onClose} className="w-full py-2 bg-brand-blue-dk text-white rounded font-medium hover:bg-brand-blue">Done</button>
                    </div>
                </div>
            </div>
        );

        // --- COVER SHEET MODAL ---
        const CoverSheetModal = ({ file, projectMeta, onClose, onSave }) => {
            const [data, setData] = useState({ sectionTitle: file.sectionTitle||"", sectionSubtitle: file.sectionSubtitle||"", designedBy: file.designedBy||file.calcsBy||"", designedDate: file.designedDate||"", checkedBy: file.checkedBy||"", checkedDate: file.checkedDate||"", qcReviewBy: file.qcReviewBy||"", qcReviewDate: file.qcReviewDate||"", revision: file.revision||"0", status: file.status||"draft" });
            const [customFields, setCustomFields] = useState((file.customFields||[{id:1,label:"Objective / Scope",value:file.objective||"",isVisible:true},{id:2,label:"Design Code / References",value:file.references||"",isVisible:true},{id:3,label:"Computer Program",value:file.program||"",isVisible:true},{id:4,label:"Conclusions",value:file.conclusions||"",isVisible:true}]).map(f=>({...f,isEditingLabel:false})));
            const hc = (f,v) => setData(p=>({...p,[f]:v}));
            const hcf = (i,k,v) => { const nf=[...customFields]; nf[i][k]=v; setCustomFields(nf); };
            const handleSave = () => { onSave(file.id,{...data,customFields:customFields.map(({isEditingLabel,...r})=>r)}); onClose(); };
            const row = (label,prefix) => (
                <div className="grid grid-cols-12 gap-2 items-center">
                    <div className="col-span-4 text-xs font-semibold text-slate-500 uppercase">{label}</div>
                    <div className="col-span-5"><input type="text" className="w-full border border-slate-300 rounded p-1.5 text-sm focus:ring-2 focus:ring-brand-blue outline-none" placeholder="Name/Initials" value={data[`${prefix}By`]} onChange={e=>hc(`${prefix}By`,e.target.value)}/></div>
                    <div className="col-span-3"><input type="date" className="w-full border border-slate-300 rounded p-1.5 text-sm outline-none" value={data[`${prefix}Date`]} onChange={e=>hc(`${prefix}Date`,e.target.value)}/></div>
                </div>
            );
            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[90vh]">
                        <div className="flex justify-between items-center p-6 border-b border-slate-100 bg-slate-50 rounded-t-xl">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><ClipboardList className="w-6 h-6 text-brand-blue"/> Calculation Cover Sheet</h2>
                            <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full text-slate-400"><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-6 overflow-y-auto space-y-6">
                            <div className="grid grid-cols-2 gap-4 p-3 bg-brand-blue-pl border border-brand-blue rounded-lg text-sm text-brand-blue-dk">
                                <div><span className="font-bold uppercase text-[10px] text-brand-blue block">Project</span>{projectMeta.title}</div>
                                <div><span className="font-bold uppercase text-[10px] text-brand-blue block">Project No</span>{projectMeta.number}</div>
                            </div>
                            <div className="space-y-3">
                                <h3 className="text-sm font-bold uppercase text-slate-400 tracking-wider border-b border-slate-100 pb-1">Identification</h3>
                                <div><label className="block text-xs font-semibold text-slate-500 mb-1">Title</label><input type="text" className="w-full border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-brand-blue outline-none" value={data.sectionTitle} onChange={e=>hc('sectionTitle',e.target.value)}/></div>
                                <div><label className="block text-xs font-semibold text-slate-500 mb-1">Subtitle / Element</label><input type="text" className="w-full border border-slate-300 rounded p-2 text-sm outline-none" value={data.sectionSubtitle} onChange={e=>hc('sectionSubtitle',e.target.value)}/></div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Status</label>
                                    <div className="flex gap-2">{STATUS_OPTIONS.map(s=>(
                                        <button key={s.value} onClick={()=>hc('status',s.value)} className={`px-3 py-1 rounded-full text-xs font-semibold border-2 transition-all ${data.status===s.value?`${s.color} border-current`:'bg-white text-slate-400 border-slate-200 hover:border-slate-300'}`}>{s.label}</button>
                                    ))}</div>
                                </div>
                            </div>
                            <div className="space-y-3">
                                <h3 className="text-sm font-bold uppercase text-slate-400 tracking-wider border-b border-slate-100 pb-1">Technical Details</h3>
                                {customFields.map((field,i)=>(
                                    <div key={i} className="flex gap-3 items-start bg-slate-50 p-3 rounded-lg border border-slate-100">
                                        <input type="checkbox" checked={field.isVisible} onChange={e=>hcf(i,'isVisible',e.target.checked)} className="mt-3 w-4 h-4 text-brand-blue rounded"/>
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-1">
                                                {field.isEditingLabel
                                                    ? <input autoFocus type="text" value={field.label} onChange={e=>hcf(i,'label',e.target.value)} onBlur={()=>hcf(i,'isEditingLabel',false)} className="text-xs font-bold uppercase bg-white border border-brand-blue rounded px-1.5 py-0.5 outline-none w-full"/>
                                                    : <><span className={`text-xs font-bold text-slate-500 uppercase ${!field.isVisible&&'opacity-50'}`}>{field.label}</span>{field.isVisible&&<button onClick={()=>hcf(i,'isEditingLabel',true)} className="p-1 text-slate-400 hover:text-brand-blue rounded"><PenTool className="w-3 h-3"/></button>}</>
                                                }
                                            </div>
                                            <textarea rows={2} value={field.value} onChange={e=>hcf(i,'value',e.target.value)} disabled={!field.isVisible} className={`w-full border rounded p-2 text-sm outline-none resize-none ${!field.isVisible?'bg-slate-100 text-slate-400 border-slate-200':'bg-white border-slate-300 focus:ring-2 focus:ring-brand-blue'}`} placeholder="Enter details..."/>
                                            {field.isVisible && <div className="text-[10px] text-right text-slate-400">{field.value.length}/2500</div>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="space-y-3">

        const LockedScreen = ({ activeSession, onTakeOver, onSignOut }) => {

        const App = () => {

            const sidRef = useRef(crypto.randomUUID());
            const claim = async (u) => { await setDoc(doc(db,...SESSION_PATH),{uid:u.uid,email:u.email,sessionId:sidRef.current,lastSeen:new Date().toISOString()}); };
            useEffect(() => { if (sessionState!=='owner'||!authUser) return; const iv=setInterval(async()=>{try{await setDoc(doc(db,...SESSION_PATH),{lastSeen:new Date().toISOString()},{merge:true});}catch(e){}},HB_MS); return()=>clearInterval(iv); },[sessionState,authUser]);

            const handleSignOut = async () => { if (sessionState==='owner'){try{await deleteDoc(doc(db,...SESSION_PATH));}catch(e){}} await signOut(auth); };

            useEffect(() => { return onAuthStateChanged(auth,async(u)=>{ if (u&&u.isAnonymous){await signOut(auth);setAuthUser(null);setSessionState('checking');} else {setAuthUser(u||null);if(!u)setSessionState('checking');} setAuthChecked(true); }); },[]);
            useEffect(() => { if (sessionState!=='owner'||!authUser) return; const f=()=>deleteDoc(doc(db,...SESSION_PATH)).catch(()=>{}); window.addEventListener('beforeunload',f); return()=>window.removeEventListener('beforeunload',f); },[sessionState,authUser]);

        // --- CALC BINDER ---
        const CalcBinder = ({ onSignOut, userEmail }) => {
            const [user, setUser] = useState(null), [syncStatus, setSyncStatus] = useState('connecting'), [authError, setAuthError] = useState(null);
            const [editingFile, setEditingFile] = useState(null), [showConfigModal, setShowConfigModal] = useState(false);
            const [projects, setProjects] = useState([]), [activeProjectId, setActiveProjectId] = useState(null);
            const [files, setFiles] = useState([]), [isProcessing, setIsProcessing] = useState(false), [pdfData, setPdfData] = useState(null);
            const [uploadProgress, setUploadProgress] = useState(null); // { current, total, name }
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedFileId, setSelectedFileId] = useState(null);
            const [dragItem, setDragItem] = useState(null), [dragOverIndex, setDragOverIndex] = useState(null), [isDraggingFile, setIsDraggingFile] = useState(false);
            const [projectMeta, setProjectMeta] = useState({ title:"Structural Calculation Package", number:"2025-001", client:"Client Name", date:new Date().toISOString().split('T')[0], description:"Structural analysis and design of primary framing members.", docType:"CALCULATION PACKAGE" });
            const [logoUrl, setLogoUrl] = useState(null), [logoScale, setLogoScale] = useState("1.0");
            const [coverImageUrl, setCoverImageUrl] = useState(null);    // Storage URL — saved to Firestore
            const [coverImagePreview, setCoverImagePreview] = useState(null); // base64 preview during upload only
            const coverImageInputRef = useRef(null);
            const [customCoverUrl, setCustomCoverUrl] = useState(null);  // Storage URL for custom cover PDF
            const [customCoverUploading, setCustomCoverUploading] = useState(false);
            const customCoverInputRef = useRef(null);
            const [themeColor, setThemeColor] = useState('#377F99'); // brand blue default
            const [bookmarksEnabled, setBookmarksEnabled] = useState(true);
            const [watermarkEnabled, setWatermarkEnabled] = useState(false);
            const [watermarkText, setWatermarkText] = useState('DRAFT');
            const [watermarkPages, setWatermarkPages] = useState('all');
            const [pageNumberPos, setPageNumberPos] = useState('right'), [showPageHeader, setShowPageHeader] = useState(true);
            const [autoUpdate, setAutoUpdate] = useState(false), [pdfLibLoaded, setPdfLibLoaded] = useState(false);
            const fileInputRef = useRef(null), logoInputRef = useRef(null), activeProjectIdRef = useRef(activeProjectId);
            useEffect(()=>{ activeProjectIdRef.current = activeProjectId; },[activeProjectId]);

            // PDF lib check
            useEffect(()=>{ const c=setInterval(()=>{if(window.PDFLib){setPdfLibLoaded(true);clearInterval(c);}},500); setTimeout(()=>clearInterval(c),5000); },[]);

            // Auto preview
            useEffect(()=>{ if (!autoUpdate||files.length===0) return; const t=setTimeout(()=>generateBinder('preview',true),1500); return()=>clearTimeout(t); },[files,projectMeta,logoUrl,coverImageUrl,coverImagePreview,customCoverUrl,themeColor,logoScale,pageNumberPos,showPageHeader,bookmarksEnabled,watermarkEnabled,watermarkText,watermarkPages,autoUpdate]);

            // Auth + projects
            useEffect(()=>{ return onAuthStateChanged(auth,async(cu)=>{ if(cu){ setUser(cu); setSyncStatus('synced'); setAuthError(null); const pr=collection(db,"artifacts",appId,"public","data","projects"); return onSnapshot(pr,(snap)=>{ const pl=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(b.lastModified)-new Date(a.lastModified)); setProjects(pl); const cid=activeProjectIdRef.current; if (pl.length>0){if(!cid)setActiveProjectId(pl[0].id);else if(!pl.find(p=>p.id===cid))setActiveProjectId(pl[0].id);} else handleCreateProject(cu.uid,"New Project"); },(e)=>setAuthError("DB Access Denied.")); } }); },[]);

            // Project data listener
            useEffect(()=>{ if (!user||!activeProjectId) return; return onSnapshot(doc(db,"artifacts",appId,"public","data","projects",activeProjectId),(snap)=>{ if(snap.exists()){const d=snap.data(); if(d.projectMeta)setProjectMeta(p=>isEqual(p,d.projectMeta)?p:d.projectMeta); if(d.files)setFiles(p=>{ const cf=d.files||[]; const pc=p.map(({fileObj,...r})=>r); if(isEqual(pc,cf))return p; return cf.map(f=>({...f,fileObj:p.find(lf=>lf.id===f.id)?.fileObj||null})); }); if(d.logoUrl)setLogoUrl(p=>p===d.logoUrl?p:d.logoUrl); if(d.logoScale!==undefined)setLogoScale(p=>p===String(d.logoScale)?p:String(d.logoScale)); if(d.pageNumberPos)setPageNumberPos(p=>p===d.pageNumberPos?p:d.pageNumberPos); if(d.showPageHeader!==undefined)setShowPageHeader(d.showPageHeader); // Only update coverImageUrl from Firestore if we're not mid-upload

                        if(d.themeColor!==undefined)setThemeColor(prev=>prev===d.themeColor?prev:d.themeColor);
                        if(d.bookmarksEnabled!==undefined)setBookmarksEnabled(d.bookmarksEnabled);
                        if(d.watermarkEnabled!==undefined)setWatermarkEnabled(d.watermarkEnabled);

                        setSyncStatus('synced'); } }); },[user,activeProjectId]);

            // Auto-save
            useEffect(()=>{ const save=async()=>{ if(user&&activeProjectId&&syncStatus!=='connecting'&&syncStatus!=='error'){ setSyncStatus('syncing'); try{ await setDoc(doc(db,"artifacts",appId,"public","data","projects",activeProjectId),{projectMeta,files:files.map(({fileObj,...r})=>r),logoUrl,coverImageUrl:(!coverImageUrl||coverImageUrl.startsWith('data:'))?null:coverImageUrl,customCoverUrl,themeColor,logoScale:parseFloat(logoScale)||1,pageNumberPos,showPageHeader,bookmarksEnabled,watermarkEnabled,watermarkText,watermarkPages,lastModified:new Date().toISOString(),modifiedBy:user.uid},{merge:true}); setSyncStatus('synced'); }catch(e){setSyncStatus('error');} } }; const t=setTimeout(save,2000); return()=>clearTimeout(t); },[files,projectMeta,logoUrl,coverImageUrl,coverImagePreview,customCoverUrl,themeColor,logoScale,pageNumberPos,showPageHeader,bookmarksEnabled,watermarkEnabled,watermarkText,watermarkPages,user,syncStatus,activeProjectId]);

            // Dynamic theme color — update CSS variables when themeColor changes
            useEffect(()=>{
                const root = document.documentElement;
                const hex = themeColor;
                const toRgb = (h) => {
                    const c = h.replace('#','');

                };

            // --- PDF BOOKMARKS HELPER ---
            const addPDFBookmarks = (pdfDoc, sections) => {
                // sections = [{ title, pageIndex, depth }]
                // Builds a 2-level outline tree (depth 0 = top level, depth > 0 = children of last top item)
                try {
                    const { PDFName, PDFString, PDFNumber } = window.PDFLib;

                            lastRoot = { ...s, children: [] };
                            tree.push(lastRoot);
                        } else if (lastRoot) {
                            lastRoot.children.push(s);
                        }
                    }
                    if (tree.length === 0) return;

                    // Helper: create Dest array pointing to top of a page
                    const makeDest = (pageIndex) => {
                        const pg = pdfDoc.getPage(pageIndex);
                        const { height: pgH } = pg.getSize();
                        return ctx.obj([pg.ref, PDFName.of('XYZ'), PDFNumber.of(0), PDFNumber.of(pgH), PDFNumber.of(0)]);
                    };

                    const rootRef = ctx.nextRef();

                    // Pre-allocate all refs so we can link Prev/Next before writing
                    const nodes = tree.map(n => ({
                        node: n,
                        ref: ctx.nextRef(),
                        childRefs: n.children.map(() => ctx.nextRef()),
                    }));

                    // Write child outline items
                    for (const nd of nodes) {
                        for (let j = 0; j < nd.node.children.length; j++) {
                            const c = nd.node.children[j];
                            const cRef = nd.childRefs[j];
                            const cEntry = {
                                Title: PDFString.of(cleanText(c.title).slice(0, 90) || 'Section'),
                                Parent: nd.ref,
                                Dest: makeDest(c.pageIndex),
                            };
                            if (j > 0) cEntry.Prev = nd.childRefs[j - 1];
                            if (j < nd.childRefs.length - 1) cEntry.Next = nd.childRefs[j + 1];
                            ctx.assign(cRef, ctx.obj(cEntry));
                        }
                    }

                    // Write top-level outline items
                    for (let i = 0; i < nodes.length; i++) {
                        const nd = nodes[i];
                        const entry = {
                            Title: PDFString.of(cleanText(nd.node.title).slice(0, 90) || 'Section'),
                            Parent: rootRef,
                            Dest: makeDest(nd.node.pageIndex),
                        };
                        if (i > 0) entry.Prev = nodes[i - 1].ref;
                        if (i < nodes.length - 1) entry.Next = nodes[i + 1].ref;
                        if (nd.childRefs.length > 0) {
                            entry.First = nd.childRefs[0];
                            entry.Last = nd.childRefs[nd.childRefs.length - 1];
                            entry.Count = PDFNumber.of(nd.childRefs.length);
                        }
                        ctx.assign(nd.ref, ctx.obj(entry));
                    }

                        Type: PDFName.of('Outlines'),
                        First: nodes[0].ref,
                        Last: nodes[nodes.length - 1].ref,
                        Count: PDFNumber.of(totalCount),
