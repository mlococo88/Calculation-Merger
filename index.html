                    // Title block — same position in both layouts
                    const titleY = height - 168;
                    drawWrappedText(cover, projectMeta.title.toUpperCase(), titleY, 20, fontBold, rgb, themeDark, width-80);

                    // Accent line below title
                    const accentY = titleY - 30;
                    cover.drawLine({start:{x:60,y:accentY},end:{x:width-60,y:accentY},thickness:0.75,color:rgb(...themeAccent)});

                    // Doc type below accent
                    drawWrappedText(cover, (projectMeta.docType||"CALCULATION PACKAGE").toUpperCase(), accentY-18, 11, fontRegular, rgb, [0.35,0.35,0.35], width-80);

                    // Project info — two-column layout so colons align
                    // Labels are right-aligned to page center; values left-aligned from center
                    const metaStartY = accentY - 38;
                    const metaLineH  = 14;
                    const metaRows = [
                        projectMeta.number ? ['Project No:', cleanText(projectMeta.number)] : null,
                        projectMeta.client  ? ['Client:',     cleanText(projectMeta.client)]  : null,
                        projectMeta.date    ? ['Date:',       cleanText(projectMeta.date)]    : null,
                    ].filter(Boolean);
                    const colGap = 8; // gap between label and value
                    metaRows.forEach(([label, value], i) => {
                        const y = metaStartY - (i * metaLineH);
                        const labelW = fontBold.widthOfTextAtSize(label, 9);
                        // Label: right-aligned to page center
                        cover.drawText(label, {
                            x: (width / 2) - labelW - colGap,
                            y, size: 9, font: fontBold, color: rgb(0.45, 0.45, 0.45),
                        });
                        // Value: left-aligned from page center
                        cover.drawText(value, {
                            x: (width / 2) + colGap,
                            y, size: 9, font: fontRegular, color: rgb(0.2, 0.2, 0.2),
                        });
                    });

                    if (embCoverImage) {
                        // ── WITH COVER IMAGE: fills remaining space below meta info ──
                        const imgTop = metaStartY - (metaRows.length * metaLineH) - 16;
                        const imgBot = 40;
                        const imgAreaH = imgTop - imgBot;
                        const scl = Math.min((width-60)/embCoverImage.width, imgAreaH/embCoverImage.height);
                        const imgW = embCoverImage.width*scl, imgH = embCoverImage.height*scl;
                        cover.drawImage(embCoverImage, {
                            x: (width-imgW)/2,
                            y: imgBot + (imgAreaH-imgH)/2,
                            width: imgW,
                            height: imgH
                        });
                    } else {
                        // ── WITHOUT COVER IMAGE: description near bottom ──
                        if(projectMeta.description) {
                            drawWrappedText(cover, projectMeta.description, 100, 9, fontOblique, rgb, [0.4,0.4,0.4], width-120);
                        }
                    }

                    } // end auto-generated cover

                    // TOC
                    const epp=25, tocPgs=Math.ceil(numberedFiles.length/epp)||1;
                    let rpn=1+tocPgs+1;
                    const analysis=numberedFiles.map(f=>{const e={...f,startPage:rpn+1};rpn+=f.isHeader?1:(1+(f.rawPages||1));return e;});
                    for(let p=0;p<tocPgs;p++){
                        const tp=pdf.addPage(SZ);
                        // TOC header
                        tp.drawRectangle({x:0,y:height-55,width:width,height:55,color:rgb(...themeDark)});
                        tp.drawText("TABLE OF CONTENTS",{x:40,y:height-35,size:18,font:fontBold,color:rgb(1,1,1)});
                        tp.drawText(`${projectMeta.number} — ${cleanText(projectMeta.title)}`,{x:40,y:height-50,size:7,font:fontRegular,color:rgb(...themePale)});
                        let yPos=height-80;
                        for(let i=p*epp;i<Math.min((p+1)*epp,analysis.length);i++){
                            const item=analysis[i];
                            const indent=item.depth===0?40:item.depth===1?60:80;
                            const font=item.depth===0?fontBold:fontRegular;
                            const fontSize=item.depth===0?11:10;
                            const titleText=cleanText(item.sectionTitle||"Untitled");
                            const pageStr=item.startPage.toString();
                            const pageStrW=font.widthOfTextAtSize(pageStr,fontSize);
                            const labelW=font.widthOfTextAtSize(item.sectionLabel+" ",fontSize);
                            const titleMaxW=width-indent-labelW-pageStrW-80;
                            const lines=getWrappedLines(titleText,fontSize,font,titleMaxW);
                            // Status dot
                            if(item.status&&item.status!=='draft'){const sc=item.status==='approved'?rgb(0.13,0.67,0.3):rgb(0.95,0.65,0.1);tp.drawCircle({x:indent-8,y:yPos+3,size:3,color:sc});}
                            tp.drawText(item.sectionLabel,{x:indent,y:yPos,size:fontSize,font});
                            lines.forEach((l,li)=>tp.drawText(l,{x:indent+labelW,y:yPos-(li*13),size:fontSize,font}));
                            // Dot leader
                            const titleW=font.widthOfTextAtSize(lines[0]||"",fontSize);
                            const dotStart=indent+labelW+titleW+4;
                            const dotEnd=width-50-pageStrW-4;
                            if(dotEnd>dotStart+10){
                                const dotStr=".";const dotW=fontRegular.widthOfTextAtSize(dotStr,fontSize);
                                let dx=dotStart;while(dx<dotEnd-dotW){tp.drawText(dotStr,{x:dx,y:yPos,size:fontSize,font:fontRegular,color:rgb(0.7,0.7,0.7)});dx+=dotW+1;}
                            }
                            tp.drawText(pageStr,{x:width-50-pageStrW,y:yPos,size:fontSize,font});
                            yPos-=(lines.length*13)+8;
                            if(item.depth===0)yPos-=2;
                        }
                    }

                    // Sections
                    // dividerPageIndices: page indices of section divider pages
                    // pageSection: page index -> { label, title } for uploaded content pages
                    // bookmarkData: flat list for outline tree
                    const dividerPageIndices = new Set();
                    const pageSection = new Map();
                    const bookmarkData = [];

                    for(const f of numberedFiles){
                        // Divider page — record its index for bookmarks + page header skip
                        const divPageIdx = pdf.getPageCount();
                        dividerPageIndices.add(divPageIdx);
                        bookmarkData.push({
                            title: `${f.sectionLabel}  ${f.sectionTitle||'Untitled'}`,
                            pageIndex: divPageIdx,
                            depth: f.depth,
                        });
                        const dp=pdf.addPage(SZ);
                        drawFormalDivider(dp,f,projectMeta,embLogo,fonts,rgb,{dark:themeDark,pale:themePale,accent:themeAccent,text:themeText});

                        if(!f.isHeader){
                            if(f.isPlaceholder){
                                for(let k=0;k<(f.rawPages||1);k++){
                                    const pgIdx=pdf.getPageCount();
                                    pageSection.set(pgIdx,{label:f.sectionLabel,title:f.sectionTitle||''});
                                    const p=pdf.addPage(SZ);
                                    drawWrappedText(p,"PLACEHOLDER",height/2,20,fontBold,rgb,[0.8,0.8,0.8]);
                                }
                            } else {
                                try {
                                    let bytes;
                                    if(f.fileObj) bytes=await f.fileObj.arrayBuffer();
                                    else if(f.downloadURL){const r=await fetch(f.downloadURL);if(!r.ok)throw new Error(`HTTP ${r.status}`);bytes=await r.arrayBuffer();}
                                    if(bytes){
                                        const src=await PDFDocument.load(bytes,{ignoreEncryption:true});
                                        const copied=await pdf.copyPages(src,src.getPageIndices());
                                        copied.forEach(pg=>{
                                            const pgIdx=pdf.getPageCount();
                                            pageSection.set(pgIdx,{label:f.sectionLabel,title:f.sectionTitle||''});
                                            pdf.addPage(pg);
                                        });
                                    }
                                } catch(e){
                                    const pgIdx=pdf.getPageCount();
                                    pageSection.set(pgIdx,{label:f.sectionLabel,title:f.sectionTitle||''});
                                    const ep=pdf.addPage(SZ);
                                    ep.drawText("Error loading: "+cleanText(f.name),{x:50,y:700,size:10,font:fontRegular});
                                }
                            }
                        }
                    }

                    // Attach PDF bookmarks (outline sidebar in Acrobat/Reader)
                    if (bookmarksEnabled && bookmarkData.length > 0) {
                        addPDFBookmarks(pdf, bookmarkData);
                    }

                    // Footer pass — page numbers + section footers + watermark
                    const cnt=pdf.getPageCount();
                    const { degrees } = window.PDFLib;
                    for(let i=0;i<cnt;i++){
                        const p=pdf.getPage(i);
                        const { width: pgW, height: pgH } = p.getSize();

                        // Page number (configured side)
                        const txt=`${i+1}`;
                        const tw=fontRegular.widthOfTextAtSize(txt,9);
                        const numX=pageNumberPos==='left'?40:pageNumberPos==='center'?(pgW-tw)/2:pgW-40-tw;
                        p.drawText(txt,{x:numX,y:18,size:9,font:fontRegular,color:rgb(0.4,0.4,0.4)});

                        // Section label + title — left footer, content pages only
                        const sec=pageSection.get(i);
                        if(sec){
                            const rawFooter=`${sec.label}  ${cleanText(sec.title)}`;
                            const maxFooterW=(pgW/2)-30;
                            const fWords=rawFooter.split(' ');
                            let fLine=fWords[0]||'';
                            for(let w=1;w<fWords.length;w++){
                                const test=fLine+' '+fWords[w];
                                if(fontBold.widthOfTextAtSize(test,8)<maxFooterW) fLine=test;
                                else break;
                            }
                            p.drawText(fLine,{x:40,y:18,size:8,font:fontBold,color:rgb(0.4,0.4,0.4)});
                        }

                        // Watermark — diagonal stamp
                        if (watermarkEnabled && watermarkText.trim()) {
                            const wText = watermarkText.trim().toUpperCase();
                            // Skip pages based on scope setting
                            const isCover = i === 0;
                            const isTOC = i > 0 && i <= tocPgs;
                            const isDivider = dividerPageIndices.has(i);
                            const isAppPage = isCover || isTOC || isDivider;
                            if (watermarkPages === 'all' || !isAppPage) {
                                // Scale font size to text length so it fills the page nicely
                                const wmSize = Math.min(72, Math.max(24, Math.floor(320 / Math.max(wText.length, 4))));
                                const wmW = fontBold.widthOfTextAtSize(wText, wmSize);
                                // Center on page, rotated 45 degrees
                                // When rotated, the text origin is at the center
                                const cx = pgW / 2;
                                const cy = pgH / 2;
                                // Offset so centered text rotates around page center
                                const offsetX = cx - (wmW / 2) * Math.cos(Math.PI/4) + (wmSize / 2) * Math.sin(Math.PI/4);
                                const offsetY = cy - (wmW / 2) * Math.sin(Math.PI/4) - (wmSize / 2) * Math.cos(Math.PI/4);
                                p.drawText(wText, {
                                    x: offsetX,
                                    y: offsetY,
                                    size: wmSize,
                                    font: fontBold,
                                    color: rgb(0.75, 0.75, 0.75),
                                    opacity: 0.22,
                                    rotate: degrees(45),
                                });
                            }
                        }
                    }

                    
                    const bytes=await pdf.save();
                    if(action==='preview'){setPdfData(bytes);}
                    else{const blob=new Blob([bytes],{type:'application/pdf'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;if(action==='open')a.target='_blank';else a.download=`Binder_${projectMeta.number}.pdf`;document.body.appendChild(a);a.click();document.body.removeChild(a);}
                } catch(e){if(!isAuto)alert("Error: "+e.message);console.error(e);}
                finally{setIsProcessing(false);}
            };

            // Export TOC only
            const exportTOC = async () => {
                setIsProcessing(true);
                try {
                    const {PDFDocument,StandardFonts,rgb}=window.PDFLib;
                    const pdf=await PDFDocument.create();
                    const fontBold=await pdf.embedFont(StandardFonts.HelveticaBold);
                    const fontRegular=await pdf.embedFont(StandardFonts.Helvetica);
                    const SZ=[612,792]; const width=612, height=792;
                    const epp=30, tocPgs=Math.ceil(numberedFiles.length/epp)||1;
                    let rpn=3;
                    const analysis=numberedFiles.map(f=>{const e={...f,startPage:rpn+1};rpn+=f.isHeader?1:(1+(f.rawPages||1));return e;});
                    for(let p=0;p<tocPgs;p++){
                        const tp=pdf.addPage(SZ);
                        tp.drawRectangle({x:0,y:height-55,width:width,height:55,color:rgb(...themeDark)});
                        tp.drawText("TABLE OF CONTENTS",{x:40,y:height-35,size:18,font:fontBold,color:rgb(1,1,1)});
                        tp.drawText(`${projectMeta.number} — ${cleanText(projectMeta.title)}`,{x:40,y:height-50,size:7,font:fontRegular,color:rgb(...themePale)});
                        let yPos=height-80;
                        for(let i=p*epp;i<Math.min((p+1)*epp,analysis.length);i++){
                            const item=analysis[i]; const indent=item.depth===0?40:item.depth===1?60:80;
                            const font=item.depth===0?fontBold:fontRegular; const fontSize=item.depth===0?11:10;
                            const pageStr=item.startPage.toString(); const pageStrW=font.widthOfTextAtSize(pageStr,fontSize);
                            const labelW=font.widthOfTextAtSize(item.sectionLabel+" ",fontSize);
                            const lines=getWrappedLines(cleanText(item.sectionTitle||"Untitled"),fontSize,font,width-indent-labelW-pageStrW-80);
                            tp.drawText(item.sectionLabel,{x:indent,y:yPos,size:fontSize,font});
                            lines.forEach((l,li)=>tp.drawText(l,{x:indent+labelW,y:yPos-(li*13),size:fontSize,font}));
                            const tw2=font.widthOfTextAtSize(lines[0]||"",fontSize),ds=indent+labelW+tw2+4,de=width-50-pageStrW-4;
                            if(de>ds+10){const dw=fontRegular.widthOfTextAtSize(".",fontSize);let dx=ds;while(dx<de-dw){tp.drawText(".",{x:dx,y:yPos,size:fontSize,font:fontRegular,color:rgb(0.7,0.7,0.7)});dx+=dw+1;}}
                            tp.drawText(pageStr,{x:width-50-pageStrW,y:yPos,size:fontSize,font});
                            yPos-=(lines.length*13)+8;
                        }
                        const pg=`${p+1}`;const pgw=fontRegular.widthOfTextAtSize(pg,9);tp.drawText(pg,{x:(width-pgw)/2,y:18,size:9,font:fontRegular,color:rgb(0.4,0.4,0.4)});
                    }
                    const bytes=await pdf.save();
                    const blob=new Blob([bytes],{type:'application/pdf'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`TOC_${projectMeta.number}.pdf`;document.body.appendChild(a);a.click();document.body.removeChild(a);
                } catch(e){alert("TOC Export Error: "+e.message);}
                finally{setIsProcessing(false);}
            };

            const getIndent = d=>d===1?"pl-5 border-l-2 border-slate-100":d===2?"pl-10 border-l-2 border-slate-100":"";

            return (
                <div className="h-full flex flex-col" onDragOver={e=>{e.preventDefault();if(e.dataTransfer.items?.length)setIsDraggingFile(true);}} onDrop={e=>{e.preventDefault();setIsDraggingFile(false);if(e.dataTransfer.files?.length)processFiles(e.dataTransfer.files);}} onDragLeave={e=>{if(!e.relatedTarget)setIsDraggingFile(false);}}>
                    {editingFile&&<CoverSheetModal key={editingFile.id} file={editingFile} projectMeta={projectMeta} onClose={()=>setEditingFile(null)} onSave={handleUpdateFileDetails}/>}
                    {showConfigModal&&<OutputConfigModal onClose={()=>setShowConfigModal(false)} pageNumberPos={pageNumberPos} setPageNumberPos={setPageNumberPos} showPageHeader={showPageHeader} setShowPageHeader={setShowPageHeader} bookmarksEnabled={bookmarksEnabled} setBookmarksEnabled={setBookmarksEnabled} watermarkEnabled={watermarkEnabled} setWatermarkEnabled={setWatermarkEnabled} watermarkText={watermarkText} setWatermarkText={setWatermarkText} watermarkPages={watermarkPages} setWatermarkPages={setWatermarkPages} totalFiles={files.length}/>}

                    {/* Header */}
                    <div className="flex-none bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm z-10">
                        <div><h1 className="text-xl font-bold text-slate-800 flex items-center gap-2"><FilePlus className="w-6 h-6 text-brand-blue"/> CalcBinder <span className="text-slate-400 font-light text-sm">Cloud</span></h1><p className="text-xs text-slate-500">Structural Engineering Calculation Compiler</p></div>
                        <div className="flex items-center gap-2">
                            {authError&&<div className="text-xs text-red-600 bg-red-50 px-2 py-1 rounded flex items-center gap-1"><AlertTriangle className="w-3 h-3"/>{authError}</div>}
                            <div className="flex items-center gap-1.5 bg-slate-100 px-2 py-1 rounded-md"><span className="text-xs font-semibold text-slate-500">Live:</span><button onClick={()=>setAutoUpdate(!autoUpdate)} className={`relative w-8 h-4 rounded-full transition-colors ${autoUpdate?'bg-green-500':'bg-slate-300'}`}><div className={`absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full shadow transition-transform ${autoUpdate?'translate-x-4':'translate-x-0'}`}/></button></div>
                            <button onClick={exportTOC} disabled={isProcessing||files.length===0} title="Export TOC only" className="p-2 text-slate-500 hover:bg-slate-100 rounded-full disabled:opacity-40"><FileDown className="w-5 h-5"/></button>
                            <button onClick={()=>setShowConfigModal(true)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-full"><Settings className="w-5 h-5"/></button>
                            <button onClick={()=>generateBinder('preview')} disabled={isProcessing} className="flex items-center gap-2 px-3 py-2 bg-white border border-slate-300 text-slate-700 font-medium rounded-md hover:bg-slate-50 text-sm">{isProcessing?<Loader2 className="w-4 h-4 animate-spin"/>:<RefreshCw className="w-4 h-4"/>} Update</button>
                            <button onClick={()=>generateBinder('download')} disabled={isProcessing} className="flex items-center gap-2 px-3 py-2 bg-brand-blue text-white font-medium rounded-md hover:bg-brand-blue-dk shadow-sm text-sm"><Save className="w-4 h-4"/> Download PDF</button>
                        </div>
                    </div>

                    {/* Upload progress bar */}
                    {uploadProgress&&<div className="flex-none bg-brand-blue px-6 py-1.5 flex items-center gap-3 text-white text-xs font-medium"><Loader2 className="w-3 h-3 animate-spin shrink-0"/><div className="flex-1 min-w-0"><span>Uploading {uploadProgress.current}/{uploadProgress.total}: </span><span className="truncate">{uploadProgress.name}</span></div><div className="w-32 bg-brand-blue-dk rounded-full h-1.5 shrink-0"><div className="bg-white h-1.5 rounded-full transition-all" style={{width:`${(uploadProgress.current/uploadProgress.total)*100}%`}}/></div></div>}

                    <div className="flex-1 grid grid-cols-12 overflow-hidden">
                        {/* Projects Sidebar */}
                        <div className="col-span-2 bg-white border-r border-slate-200 flex flex-col h-full overflow-hidden">
                            <div className="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50"><h2 className="font-semibold text-slate-700 text-sm flex items-center gap-2"><Layout className="w-4 h-4"/> Projects</h2><button onClick={()=>handleCreateProject(user?.uid)} className="p-1 hover:bg-white rounded shadow-sm text-brand-blue"><FolderPlus className="w-4 h-4"/></button></div>
                            <div className="overflow-y-auto flex-1 p-2 space-y-1">
                                {projects.map(p=>(
                                    <div key={p.id} onClick={()=>setActiveProjectId(p.id)} className={`p-2 rounded text-xs cursor-pointer flex justify-between group ${activeProjectId===p.id?'bg-brand-blue-pl text-brand-blue-dk font-medium border-l-4 border-brand-blue':'hover:bg-slate-50 text-slate-600 border-l-4 border-transparent'}`}>
                                        <div className="truncate pr-1"><div className="truncate">{p.id===activeProjectId?projectMeta.title:(p.projectMeta?.title||"Untitled")}</div><div className="text-[10px] opacity-70">{new Date(p.lastModified).toLocaleDateString()}</div></div>
                                        <div className="flex flex-col gap-1 opacity-0 group-hover:opacity-100"><button onClick={e=>handleCopyProject(e,p.id)}><Copy className="w-3 h-3 hover:text-brand-blue"/></button><button onClick={e=>handleDeleteProject(p.id,e)}><Trash2 className="w-3 h-3 hover:text-red-500"/></button></div>
                                    </div>
                                ))}
                            </div>
                            <div className="p-3 border-t border-slate-200 bg-slate-50 space-y-1">
                                {user&&<p className="text-[10px] text-slate-400 text-center truncate">{user.email}</p>}
                                <button onClick={handleLogout} className="w-full py-1.5 text-xs text-slate-500 hover:text-red-600 hover:bg-white border border-transparent hover:border-slate-200 rounded flex items-center justify-center gap-2"><LogOut className="w-3 h-3"/> Sign Out</button>
                            </div>
                        </div>

                        {/* Main Workspace */}
                        <div className="col-span-6 bg-slate-50 h-full overflow-y-auto p-5 border-r border-slate-200">
                            {/* Project meta */}
                            <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 mb-5">
                                <div className="grid grid-cols-12 gap-4">
                                    <div className="col-span-3">
                                        <div className="w-full aspect-square bg-slate-50 border-2 border-dashed border-slate-300 rounded-lg flex items-center justify-center cursor-pointer hover:border-brand-blue relative group" onClick={()=>logoInputRef.current?.click()}>
                                            {logoUrl?<><img src={logoUrl} className="w-full h-full object-contain p-2"/><button onClick={e=>{e.stopPropagation();removeLogo();}} className="absolute top-1 right-1 p-1 bg-white rounded-full shadow hover:text-red-500 opacity-0 group-hover:opacity-100"><X className="w-3 h-3"/></button></>:<ImageIcon className="w-6 h-6 text-slate-300"/>}
                                            <input type="file" className="hidden" ref={logoInputRef} onChange={handleLogoUpload}/>
                                        </div>
                                    </div>
                                    <div className="col-span-9 grid grid-cols-2 gap-2">
                                        <div className="col-span-2"><label className="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Project Name</label><input type="text" value={projectMeta.title} onChange={e=>updateMeta('title',e.target.value)} className="w-full px-2 py-1 text-sm border border-slate-300 rounded focus:border-brand-blue outline-none"/></div>
                                        <div><label className="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Number</label><input type="text" value={projectMeta.number} onChange={e=>updateMeta('number',e.target.value)} className="w-full px-2 py-1 text-sm border border-slate-300 rounded outline-none"/></div>
                                        <div><label className="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Date</label><input type="date" value={projectMeta.date} onChange={e=>updateMeta('date',e.target.value)} className="w-full px-2 py-1 text-sm border border-slate-300 rounded outline-none"/></div>
                                        <div className="col-span-2"><label className="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Client</label><input type="text" value={projectMeta.client} onChange={e=>updateMeta('client',e.target.value)} className="w-full px-2 py-1 text-sm border border-slate-300 rounded outline-none"/></div>
                                        <div className="col-span-2"><label className="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Description <span className="normal-case font-normal text-slate-300">(appears on cover page)</span></label><input type="text" value={projectMeta.description||''} onChange={e=>updateMeta('description',e.target.value)} placeholder="e.g. Structural analysis of primary framing members" className="w-full px-2 py-1 text-sm border border-slate-300 rounded outline-none placeholder-slate-300"/></div>
                                        <div className="col-span-2">
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Theme Color</label>
                                            <div className="flex items-center gap-3">
                                                {/* Color wheel input */}
                                                <div className="relative shrink-0">
                                                    <input
                                                        type="color"
                                                        value={themeColor}
                                                        onChange={e=>setThemeColor(e.target.value)}
                                                        className="w-10 h-10 rounded-full cursor-pointer border-2 border-slate-200 p-0.5"
                                                        title="Pick theme color"
                                                        style={{appearance:'none',backgroundColor:'transparent'}}
                                                    />
                                                </div>
                                                {/* Hex input */}
                                                <input
                                                    type="text"
                                                    value={themeColor}
                                                    onChange={e=>{ if(/^#[0-9A-Fa-f]{0,6}$/.test(e.target.value)) setThemeColor(e.target.value); }}
                                                    className="w-24 px-2 py-1 text-sm border border-slate-300 rounded outline-none font-mono uppercase"
                                                    maxLength={7}
                                                    placeholder="#377F99"
                                                />
                                                {/* Preset swatches */}
                                                <div className="flex gap-1.5 flex-wrap">
                                                    {[
                                                        {c:'#377F99', label:'Brand Blue'},
                                                        {c:'#265f75', label:'Dark Blue'},
                                                        {c:'#C8102E', label:'Brand Red'},
                                                        {c:'#54585A', label:'Brand Gray'},
                                                        {c:'#1a1a2e', label:'Navy'},
                                                        {c:'#2d6a4f', label:'Forest'},
                                                        {c:'#6d28d9', label:'Purple'},
                                                        {c:'#b45309', label:'Amber'},
                                                    ].map(({c,label})=>(
                                                        <button
                                                            key={c}
                                                            title={label}
                                                            onClick={()=>setThemeColor(c)}
                                                            className="w-5 h-5 rounded-full border-2 transition-transform hover:scale-110"
                                                            style={{backgroundColor:c, borderColor: themeColor===c ? '#000' : 'transparent'}}
                                                        />
                                                    ))}
                                                </div>
                                            </div>
                                            <p className="text-[10px] text-slate-400 mt-1">Applied to PDF header bands, cover page, dividers, and TOC.</p>
                                        </div>
                                        {/* Custom cover PDF upload */}
                                        <div className="col-span-2">
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Custom Cover Page <span className="normal-case font-normal text-slate-300">(PDF · optional)</span></label>
                                            <div className={`w-full border-2 border-dashed rounded-lg p-2.5 flex items-center gap-3 transition-colors ${customCoverUrl ? 'border-brand-blue bg-brand-blue-pl' : 'border-slate-300 bg-slate-50 hover:border-brand-blue cursor-pointer'}`}
                                                onClick={!customCoverUrl ? ()=>customCoverInputRef.current?.click() : undefined}>
                                                <input type="file" accept=".pdf" className="hidden" ref={customCoverInputRef} onChange={handleCustomCoverUpload}/>
                                                {customCoverUploading ? (
                                                    <><Loader2 className="w-4 h-4 animate-spin text-brand-blue shrink-0"/><span className="text-xs text-brand-blue">Uploading cover PDF...</span></>
                                                ) : customCoverUrl ? (
                                                    <>
                                                        <FileText className="w-4 h-4 text-brand-blue shrink-0"/>
                                                        <span className="text-xs text-brand-blue font-medium flex-1">Custom cover uploaded</span>
                                                        <button onClick={e=>{e.stopPropagation();removeCustomCover();}} className="text-[10px] text-red-500 hover:text-red-700 font-medium shrink-0">Remove</button>
                                                    </>
                                                ) : (
                                                    <><Upload className="w-4 h-4 text-slate-400 shrink-0"/><span className="text-xs text-slate-500">Upload your own cover page PDF</span></>
                                                )}
                                            </div>
                                            {customCoverUrl && <p className="text-[10px] text-slate-400 mt-1">Your PDF will be used as-is. The auto-generated cover, logo, and cover image will be skipped.</p>}
                                        </div>

                                        <div className="col-span-2">
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Cover Image <span className="normal-case font-normal text-slate-300">(optional · max 3MB)</span></label>
                                            <div className="relative w-full h-16 bg-slate-50 border-2 border-dashed border-slate-300 rounded-lg flex items-center justify-center cursor-pointer hover:border-brand-blue overflow-hidden group" onClick={()=>coverImageInputRef.current?.click()}>
                                                {(coverImagePreview || coverImageUrl)
                                                    ? <>
                                                        <img src={coverImagePreview || coverImageUrl} className="w-full h-full object-cover"/>
                                                        {coverImagePreview && !coverImageUrl && (
                                                            <div className="absolute bottom-0 left-0 right-0 bg-brand-blue/80 text-white text-[9px] text-center py-0.5 flex items-center justify-center gap-1">
                                                                <Loader2 className="w-2.5 h-2.5 animate-spin"/> Uploading...
                                                            </div>
                                                        )}
                                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center gap-2 transition-opacity">
                                                            <span className="text-white text-xs font-semibold">Change</span>
                                                            <button onMouseDown={e=>{e.stopPropagation();e.preventDefault();removeCoverImage();}} className="text-white text-xs underline">Remove</button>
                                                        </div>
                                                      </>
                                                    : <div className="flex items-center gap-2 text-slate-400"><ImageIcon className="w-4 h-4"/><span className="text-xs">Click to upload cover image</span></div>
                                                }
                                                <input type="file" accept="image/jpeg,image/png" className="hidden" ref={coverImageInputRef} onChange={handleCoverImageUpload}/>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Upload / add buttons */}
                            <div className="flex gap-3 mb-4">
                                <div className={`flex-1 border-2 border-dashed rounded-lg p-3 text-center cursor-pointer transition-colors ${isDraggingFile?'border-brand-blue bg-brand-blue-pl':'border-slate-300 bg-white hover:border-brand-blue'}`} onClick={()=>fileInputRef.current?.click()} onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';}} onDrop={e=>{e.preventDefault();e.stopPropagation();setIsDraggingFile(false);if(e.dataTransfer.files?.length)processFiles(e.dataTransfer.files);}}>
                                    <input type="file" multiple accept=".pdf" className="hidden" ref={fileInputRef} onChange={handleFileUpload}/>
                                    <Upload className={`w-6 h-6 mx-auto mb-1 ${isDraggingFile?'text-brand-blue':'text-slate-400'}`}/>
                                    <p className="text-xs font-medium text-slate-600">Add PDFs</p>
                                </div>
                                <div className="flex flex-col gap-2 w-36">
                                    <button onClick={handleAddPlaceholder} className="flex-1 border border-slate-200 bg-white hover:bg-emerald-50 hover:border-emerald-300 rounded-lg flex items-center justify-center gap-2 text-xs font-medium text-slate-600 transition-colors"><FileQuestion className="w-3.5 h-3.5 text-emerald-500"/> Placeholder</button>
                                    <button onClick={handleAddHeader} className="flex-1 border border-slate-200 bg-white hover:bg-violet-50 hover:border-violet-300 rounded-lg flex items-center justify-center gap-2 text-xs font-medium text-slate-600 transition-colors"><Type className="w-3.5 h-3.5 text-violet-500"/> Header</button>
                                </div>
                            </div>

                            {/* Search + stats */}
                            <div className="flex items-center gap-2 mb-3">
                                <div className="flex-1 relative">
                                    <Search className="w-3.5 h-3.5 absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400"/>
                                    <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-8 pr-3 py-1.5 text-xs border border-slate-300 rounded-lg focus:border-brand-blue outline-none bg-white" placeholder="Search sections..."/>
                                    {searchQuery&&<button onClick={()=>setSearchQuery('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"><X className="w-3 h-3"/></button>}
                                </div>
                                <span className="text-[10px] text-slate-400 whitespace-nowrap">{files.length} sections · {files.reduce((a,f)=>a+(f.rawPages||0),0)} pages</span>
                            </div>
                            {selectedFileId&&<p className="text-[10px] text-slate-400 mb-2 text-right">Alt+↑↓ to reorder · Delete to remove</p>}

                            {/* File list */}
                            <ul className="space-y-1.5">
                                {filteredFiles.map((file,index)=>{
                                    const realIndex=files.findIndex(f=>f.id===file.id);
                                    const isSelected=selectedFileId===file.id;
                                    const statusStyle=getStatusStyle(file.status);
                                    return (
                                        <li key={file.id}
                                            className={`bg-white rounded border shadow-sm transition-all ${file.isHeader?'border-l-4 border-l-violet-400 bg-violet-50/30':file.isPlaceholder?'border-l-4 border-l-yellow-400 bg-yellow-50/30':'border-slate-200'} ${dragOverIndex===realIndex?'border-t-2 border-t-brand-blue':''} ${dragItem?.index===realIndex?'opacity-40':''} ${isSelected?'ring-2 ring-brand-blue ring-offset-1':''}`}
                                            onClick={()=>setSelectedFileId(file.id)}
                                            onDragEnter={()=>handleDragEnter(null,realIndex)} onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect='move';}} onDragEnd={handleDragEnd} onDrop={e=>handleDrop(e,realIndex)}
                                        >
                                            {/* Row header */}
                                            <div className="flex items-center gap-2 p-2.5">
                                                <div className="cursor-move text-slate-300 hover:text-slate-500 shrink-0" draggable onDragStart={e=>{const r=e.currentTarget.closest('li');if(r)e.dataTransfer.setDragImage(r,0,0);handleDragStart(e,realIndex);}} onDragEnd={handleDragEnd}><GripVertical className="w-4 h-4"/></div>
                                                <div className="flex flex-col shrink-0">
                                                    <button onClick={e=>{e.stopPropagation();moveFile(realIndex,-1);}} disabled={realIndex===0} className="text-slate-300 hover:text-slate-600 disabled:opacity-0"><ArrowUp className="w-3 h-3"/></button>
                                                    <button onClick={e=>{e.stopPropagation();moveFile(realIndex,1);}} disabled={realIndex===files.length-1} className="text-slate-300 hover:text-slate-600 disabled:opacity-0"><ArrowDown className="w-3 h-3"/></button>
                                                </div>
                                                <div className="flex gap-0.5 shrink-0">
                                                    <button onClick={e=>{e.stopPropagation();changeDepth(realIndex,-1);}} disabled={file.depth===0} className="text-slate-300 hover:text-slate-600 disabled:opacity-20"><ArrowLeft className="w-3 h-3"/></button>
                                                    <button onClick={e=>{e.stopPropagation();changeDepth(realIndex,1);}} disabled={file.depth>=2||realIndex===0} className="text-slate-300 hover:text-slate-600 disabled:opacity-20"><ArrowRight className="w-3 h-3"/></button>
                                                </div>
                                                <span className="w-7 font-mono font-bold text-slate-400 text-xs shrink-0">{file.sectionLabel}</span>
                                                <div className={`flex-1 min-w-0 ${getIndent(file.depth)}`}>
                                                    <div className="flex items-center gap-2">
                                                        <input type="text" value={file.sectionTitle} onChange={e=>{e.stopPropagation();updateFileField(file.id,'sectionTitle',e.target.value);}} onClick={e=>e.stopPropagation()} className="flex-1 font-semibold text-sm bg-transparent border-b border-transparent focus:border-brand-blue outline-none min-w-0 truncate"/>
                                                        {!file.isHeader&&<span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-full shrink-0 ${statusStyle.color}`}>{statusStyle.label}</span>}
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-1 shrink-0">
                                                    {!file.isHeader&&<button onClick={e=>{e.stopPropagation();generateBinder('open',false,file.id);}} title="Preview divider" className="p-1 text-slate-300 hover:text-brand-blue hover:bg-brand-blue-pl rounded"><Eye className="w-3.5 h-3.5"/></button>}
                                                    <button onClick={e=>{e.stopPropagation();setEditingFile(file);}} title="Edit details" className="p-1 text-slate-300 hover:text-brand-blue hover:bg-brand-blue-pl rounded"><FileText className="w-3.5 h-3.5"/></button>
                                                    <button onClick={e=>{e.stopPropagation();toggleCollapse(file.id);}} className="p-1 text-slate-300 hover:text-slate-600 rounded">{file.isCollapsed?<ChevronDown className="w-3.5 h-3.5"/>:<ChevronUp className="w-3.5 h-3.5"/>}</button>
                                                    <button onClick={e=>{e.stopPropagation();removeFile(file.id);}} className="p-1 text-slate-300 hover:text-red-500 rounded"><Trash2 className="w-3.5 h-3.5"/></button>
                                                </div>
                                            </div>
                                            {/* Expanded content */}
                                            {!file.isCollapsed&&(
                                                <div className="px-3 pb-2.5 space-y-1.5 border-t border-slate-50">
                                                    <input type="text" value={file.sectionSubtitle||''} onChange={e=>updateFileField(file.id,'sectionSubtitle',e.target.value)} onClick={e=>e.stopPropagation()} className="w-full text-xs text-slate-500 bg-transparent border-b border-transparent focus:border-brand-blue outline-none placeholder-slate-300 mt-1.5" placeholder="Subtitle / element description"/>
                                                    {!file.isHeader&&(
                                                        <div className="flex items-center justify-between">
                                                            <div className="flex items-center gap-2 text-[10px] text-slate-400">
                                                                <span className={`font-medium truncate max-w-[120px] ${!file.isPlaceholder&&!file.fileObj&&!file.downloadURL?'text-red-500':''}`} title={file.name}>{file.name}</span>
                                                                <span>·</span>
                                                                {file.isPlaceholder
                                                                    ? <span className="flex items-center gap-1">Pages: <input type="number" min="1" value={file.rawPages||1} onChange={e=>{e.stopPropagation();const v=parseInt(e.target.value)||1;updateFileField(file.id,'rawPages',v);updateFileField(file.id,'pageCount',v);}} onClick={e=>e.stopPropagation()} className="w-10 border border-slate-300 rounded px-1 text-center outline-none text-[10px]"/></span>
                                                                    : <span>{file.pageCount} pgs</span>
                                                                }
                                                                {file.lastModifiedBy&&<span className="hidden xl:flex items-center gap-0.5 text-slate-300"><Clock className="w-2.5 h-2.5"/>{file.lastModifiedBy.split('@')[0]}</span>}
                                                            </div>
                                                            <label className={`cursor-pointer text-[10px] font-bold uppercase tracking-wider flex items-center gap-1 px-2 py-0.5 rounded transition-colors ${file.isPlaceholder?'bg-emerald-50 text-emerald-600 hover:bg-emerald-100':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                                                {file.isPlaceholder?<Upload className="w-3 h-3"/>:<RefreshCw className="w-3 h-3"/>}
                                                                {file.isPlaceholder?"Upload":"Replace"}
                                                                <input type="file" accept=".pdf" className="hidden" onChange={e=>file.isPlaceholder?handleReplacePlaceholder(e,file.id):handleReplaceFile(e,file.id)} onClick={e=>e.target.value=null}/>
                                                            </label>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </li>
                                    );
                                })}
                                {filteredFiles.length===0&&files.length>0&&<li className="text-center text-slate-400 text-sm py-8">No sections match "{searchQuery}"</li>}
                            </ul>
                        </div>

                        {/* Preview */}
                        <div className="col-span-4 h-full flex flex-col border-l border-slate-300">
                            <div className="flex-none p-2 bg-slate-100 border-b border-slate-200 text-xs flex justify-between px-4 items-center text-slate-500 font-medium">
                                <span>Preview</span>
                                <div className="flex items-center gap-2">
                                    {isProcessing&&<span className="flex items-center gap-1 text-brand-blue"><Loader2 className="w-3 h-3 animate-spin"/> Generating...</span>}
                                    {pdfData&&<button onClick={()=>generateBinder('open')} className="p-1 hover:bg-slate-200 rounded hover:text-brand-blue" title="Open in new tab"><ExternalLink className="w-3 h-3"/></button>}
                                </div>
                            </div>
                            <div className="flex-1 overflow-hidden relative bg-slate-300">
                                {pdfData?<PdfCanvasPreview pdfData={pdfData}/>:(
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-8 text-center">
                                        <Eye className="w-12 h-12 mb-2 opacity-50"/>
                                        <p className="text-sm">Click "Update" or add files to generate preview.</p>
                                        <p className="text-xs mt-1 opacity-60">Or click the eye icon on any section to preview its divider page.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><React.Fragment>{isConfigured?<App/>:<SetupScreen onSave={()=>window.location.reload()}/>}</React.Fragment></ErrorBoundary>);
    </script>
</body>
</html>
